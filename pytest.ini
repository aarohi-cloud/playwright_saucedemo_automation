[pytest]
testpaths = tests
addopts =
    --headless
    --screenshot only-on-failure
    --video retain-on-failure
    --tracing retain-on-failure
    --alluredir=allure-results
    --html=reports/report.html
    --self-contained-html
    -v

markers =
    smoke: marks tests as smoke tests
    regression: marks tests as regression tests
    login: marks tests as login tests
    cart: marks tests as cart tests
    checkout: marks tests as checkout tests
    inventory: marks tests as inventory tests
```

Key changes: `--headless` as default (safe for CI), Allure results go to `allure-results/` at root (CI standard), screenshots/video/tracing captured on failure automatically.

---

## Step 4 — Add `.gitignore` entries

Add these lines to your existing `.gitignore`:
```
allure-results/
allure-report/
reports/
test-results/